name: Build and Push to Registry

on:
  workflow_call:
    inputs:
      context:
        description: 'Path to build context'
        required: false
        type: string
        default: '.'
      runner:
        description: 'Runner to use for the job'
        required: false
        type: string
        default: 'self-hosted'
      docker-endpoint:
        description: 'Docker daemon endpoint'
        required: false
        type: string
        default: 'tcp://localhost:2375'
      insecure-registry:
        description: 'Whether to allow insecure registry connections'
        required: false
        type: boolean
        default: false
      image-name:
        description: 'Name of the Docker image (defaults to repository name)'
        required: false
        type: string
    secrets:
      DOCKER_REGISTRY:
        description: 'Docker registry URL'
        required: false

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || vars.DOCKER_REGISTRY }}
  IMAGE_NAME: ${{ inputs.image-name || github.repository }}

jobs:
  build-and-push:
    runs-on: ${{ inputs.runner || 'self-hosted' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: ${{ inputs.docker-endpoint || 'tcp://localhost:2375' }}
          driver-opts: network=host
          buildkitd-flags: ${{ inputs.insecure-registry && '--allow-insecure-entitlement security.insecure' || '' }}
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY }}"]
              http = true
              insecure = true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value={{sha}}-{{date 'YYYYMMDDHHmmss'}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context || '.'}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed with tags ${{ steps.meta.outputs.tags }}"
